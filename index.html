<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | IDENTITY INITIALIZATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-client"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .vault-box { border: 2px solid #0f0; padding: 30px; display: inline-block; box-shadow: 0 0 20px #0f0; background: #050505; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; margin: 15px; width: 250px; font-size: 16px; }
        button { background: #0f0; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #00cc00; box-shadow: 0 0 10px #0f0; }
        #status { margin-top: 25px; font-weight: bold; color: #00ffcc; }
    </style>
</head>
<body>
    <div class="vault-box">
        <h1 style="letter-spacing: 5px;">PROJECT NEXUS</h1>
        <p style="color: #888;">ESTABLISHING CRYPTO-LINK WITH THINKPAD HARDWARE...</p>
        
        <input type="text" id="opName" placeholder="ENTER OPERATOR NAME">
        <br>
        <button onclick="initializeNexus()">INITIALIZE IDENTITY</button>

        <div id="status">SYSTEM STATUS: STANDBY</div>
    </div>

    <script>
        // TERA SECURE CONFIG (No Secret Keys Here)
        const SB_URL = "https://juesetrcnzyuybnwuyw.supabase.co";
        const SB_KEY = "sb_publishable_uP_mUKCmIANR-Stm0gjSVA_fpcHnji1"; // Screenshot se sb_public_... wali key yahan daal
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function initializeNexus() {
            const name = document.getElementById('opName').value;
            const status = document.getElementById('status');
            
            if(!name) {
                status.innerText = "ERROR: NAME REQUIRED";
                return;
            }

            try {
                status.innerText = "GENERATING HARDWARE KEYS...";

                // Creating Crypto Key Pair
                const keyPair = await window.crypto.subtle.generateKey(
                    { name: "ECDSA", namedCurve: "P-256" },
                    true, ["sign", "verify"]
                );

                const pubKeyRaw = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const pubKeyString = btoa(String.fromCharCode(...new Uint8Array(pubKeyRaw)));
                const uniqueID = "NX-" + Math.random().toString(36).substr(2, 9).toUpperCase();

                status.innerText = "LOCKING DATA IN VAULT...";

                // Saving to Supabase
                const { error } = await supabaseClient
                    .from('identities')
                    .insert([{ 
                        unique_id: uniqueID, 
                        public_key: pubKeyString, 
                        operator_name: name 
                    }]);

                if (error) throw error;

                status.innerHTML = `<span style="color:yellow;">LINK ESTABLISHED!</span><br>ID: ${uniqueID}<br>OP: ${name}`;

            } catch (err) {
                status.innerText = "SYSTEM ERROR: " + err.message;
            }
        }
    </script>
</body>
</html>
