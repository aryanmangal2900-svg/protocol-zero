<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOL ZERO | Persistent Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qr-code"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #080808; color: #00F2FF; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(0, 242, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.1); }
        .scan-line { height: 2px; background: #00F2FF; position: absolute; width: 100%; top: 0; animation: scan 3s linear infinite; box-shadow: 0 0 15px #00F2FF; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #auth-overlay { position: fixed; inset: 0; background: #080808; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .glow-text { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
    </style>
</head>
<body>

    <!-- LOCK SCREEN (Always Triggers on Load) -->
    <div id="auth-overlay">
        <div class="max-w-md w-full p-12 glass rounded-[3rem] text-center relative overflow-hidden border-cyan-500/30">
            <div class="scan-line"></div>
            <h1 class="text-3xl font-black tracking-tighter mb-2 mono glow-text">PROTOCOL ZERO</h1>
            <p id="auth-status" class="text-[10px] text-gray-500 uppercase tracking-[0.5em] mb-12">System Locked</p>
            
            <div class="flex justify-center mb-10">
                <div class="w-24 h-24 rounded-full border border-cyan-500/20 flex items-center justify-center animate-pulse">
                    <svg class="w-12 h-12 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
                    </svg>
                </div>
            </div>

            <button onclick="triggerBiometric()" class="w-full py-5 bg-cyan-500 text-black font-black rounded-2xl hover:bg-cyan-400 transition-all uppercase tracking-widest text-xs">
                Verify Identity
            </button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" class="hidden min-h-screen flex flex-col p-6 md:p-12 overflow-y-auto">
        <div class="flex justify-between items-center mb-12 border-b border-white/5 pb-6">
            <h2 class="text-3xl font-black italic glow-text uppercase">Identity Forge</h2>
            <div class="text-right mono text-[10px] text-gray-500">
                <p>STATUS: <span class="text-green-500">ENCRYPTED</span></p>
                <p>NODE: HBSE_KARNAL_01</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- TOKEN GENERATOR -->
            <div class="glass p-8 rounded-[2rem] border-white/5">
                <h3 class="mono text-[11px] mb-6 text-gray-400 uppercase tracking-widest">Generator</h3>
                <input type="text" id="alias" placeholder="Operator Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none mono text-white mb-4">
                <button onclick="generateEliteQR()" class="w-full py-4 bg-cyan-500/10 border border-cyan-500/50 text-cyan-400 font-bold rounded-xl hover:bg-cyan-500 hover:text-black transition-all uppercase text-[10px]">Generate Token</button>
                <div id="qr-container" class="mt-8 hidden flex flex-col items-center animate-in fade-in">
                    <div id="qrcode" class="p-4 bg-white rounded-xl"></div>
                </div>
            </div>

            <!-- TOKEN VALIDATOR -->
            <div class="glass p-8 rounded-[2rem] border-white/5 bg-cyan-500/5">
                <h3 class="mono text-[11px] mb-6 text-cyan-400 uppercase tracking-widest">Validator</h3>
                <label class="w-full py-10 border border-dashed border-cyan-500/30 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-cyan-500/10 transition-all">
                    <span class="mono text-[10px] text-cyan-500">SCAN QR TO VERIFY</span>
                    <input type="file" id="qr-input" accept="image/*" class="hidden" onchange="verifyUploadedQR(event)">
                </label>
                <div id="verification-result" class="mt-6 hidden p-4 rounded-xl bg-black/60 border border-white/5"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. PERSISTENT LOCK (Every Refresh = Lock)
        window.onload = () => {
            const isRegistered = localStorage.getItem('p0_registered');
            if (isRegistered) {
                document.getElementById('auth-status').innerText = "Identify Yourself, Operator.";
            } else {
                document.getElementById('auth-status').innerText = "New Device Detected. Secure Now.";
            }
        };

        async function triggerBiometric() {
            const status = document.getElementById('auth-status');
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                const credential = await navigator.credentials.create({
                    publicKey: {
                        challenge,
                        rp: { name: "Protocol Zero" },
                        user: { id: new Uint8Array([1]), name: "user@p0", displayName: "Aryan" },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: { authenticatorAttachment: "platform" }
                    }
                });
                if (credential) {
                    localStorage.setItem('p0_registered', 'true');
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.body.style.overflow = 'auto';
                }
            } catch (err) {
                status.innerHTML = "<span class='text-red-500'>ACCESS DENIED</span>";
            }
        }

        // 2. GENERATOR (Correct Date Format DD-MM-YYYY)
        function generateEliteQR() {
            const alias = document.getElementById('alias').value;
            if(!alias) return;
            
            const now = new Date();
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            const timestamp = `${d}-${m}-${y} | ${now.toLocaleTimeString()}`;

            const payload = JSON.stringify({
                token: "P0-" + Math.random().toString(36).substr(2, 12).toUpperCase(),
                op: alias,
                created: timestamp,
                origin: "PROTOCOL_ZERO_OFFICIAL"
            });

            document.getElementById('qr-container').classList.remove('hidden');
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: payload, width: 200, height: 200 });
        }

        // 3. VALIDATOR (Check if QR is ours)
        async function verifyUploadedQR(event) {
            const file = event.target.files[0];
            if (!file) return;
            const html5QrCode = new Html5Qrcode("verification-result");
            const resultDiv = document.getElementById('verification-result');
            try {
                const decodedText = await html5QrCode.scanFile(file, true);
                const data = JSON.parse(decodedText);
                if (data.origin === "PROTOCOL_ZERO_OFFICIAL") {
                    resultDiv.innerHTML = `
                        <div class="text-green-400 mono text-[10px]">
                            <p class="font-bold uppercase tracking-widest underline mb-2">Verified Authentic Token</p>
                            <p class="text-white">OPERATOR: ${data.op}</p>
                            <p>TIME: ${data.created}</p>
                            <p class="text-gray-500">ID: ${data.token}</p>
                        </div>`;
                } else {
                    resultDiv.innerHTML = `<p class="text-red-500 mono text-[10px]">WARNING: Forged Token Detected.</p>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p class="text-red-400 mono text-[10px]">Error: Invalid Protocol Data.</p>`;
            }
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
