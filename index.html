<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Protocol Zero | Final Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space+Grotesk', sans-serif; background: #000; color: #00ff88; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(0, 255, 136, 0.15); }
        .input-box { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(0, 255, 136, 0.2); transition: 0.3s; }
        .input-box:focus-within { border-color: #00ff88; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center overflow-hidden">

    <!-- AUTH & RECOVERY SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-50 bg-black flex items-center justify-center p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-[0_0_80px_rgba(0,255,136,0.05)] text-center">
            <h2 id="auth-title" class="text-2xl font-bold mb-10 tracking-[0.4em] text-emerald-400 uppercase">System Lock</h2>
            
            <!-- Login Fields -->
            <div id="auth-fields" class="space-y-4">
                <div class="input-box flex items-center p-4 rounded-2xl">
                    <input type="text" id="log-user" placeholder="Username" class="bg-transparent w-full outline-none text-white placeholder:text-zinc-600">
                </div>

                <div class="input-box flex items-center p-4 rounded-2xl relative">
                    <input type="password" id="log-pass" placeholder="Password" class="bg-transparent w-full outline-none text-white placeholder:text-zinc-600">
                    <button onclick="togglePass('log-pass')" class="text-emerald-500 text-xs font-bold px-2 uppercase opacity-60 hover:opacity-100">Show</button>
                </div>

                <div class="input-box flex items-center p-4 rounded-2xl">
                    <input type="text" id="log-city" placeholder="City (For Recovery)" class="bg-transparent w-full outline-none text-white placeholder:text-zinc-600">
                </div>

                <button onclick="processAuth()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black font-black py-5 rounded-2xl uppercase transition-all mt-4 text-sm tracking-widest shadow-lg shadow-emerald-500/20">
                    Execute Authentication
                </button>

                <button onclick="showRecovery()" class="block w-full text-[10px] text-zinc-500 uppercase tracking-widest hover:text-emerald-400 transition-colors pt-4">
                    Forgot Details? Recover via City
                </button>
            </div>

            <!-- Recovery Fields -->
            <div id="recovery-fields" class="hidden space-y-6">
                <p class="text-xs text-emerald-400/60 uppercase italic">Enter Registered City to Wipe Vault</p>
                <div class="input-box flex items-center p-4 rounded-2xl">
                    <input type="text" id="recover-city" placeholder="Confirm City Name" class="bg-transparent w-full outline-none text-white text-center">
                </div>
                <button onclick="verifyAndReset()" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase transition-all">Reset & Create New</button>
                <button onclick="location.reload()" class="block w-full text-[10px] text-zinc-600 uppercase">Back</button>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD (HIDDEN UNTIL AUTH) -->
    <div id="main-ui" class="hidden h-full w-full bg-zinc-950 flex">
        <div class="p-20 text-center w-full">
            <h1 class="text-4xl text-emerald-500 font-black mb-4 uppercase">Access Granted</h1>
            <p class="text-zinc-500">Welcome back, Lead Operator Aryan.</p>
            <button onclick="location.reload()" class="mt-10 px-8 py-3 border border-red-900 text-red-500 rounded-xl uppercase text-xs font-bold">Logout</button>
        </div>
    </div>

    <script>
        // --- AUTH LOGIC ---
        function processAuth() {
            const u = document.getElementById('log-user').value.trim();
            const p = document.getElementById('log-pass').value.trim();
            const c = document.getElementById('log-city').value.trim();
            const saved = JSON.parse(localStorage.getItem('nexus_master_vault'));

            if (!saved) {
                if (u && p && c) {
                    localStorage.setItem('nexus_master_vault', JSON.stringify({user:u, pass:p, city:c}));
                    alert("Identity Created! Now login with these details.");
                    location.reload();
                } else { alert("Please fill all fields to setup your account."); }
            } else {
                if (u === saved.user && p === saved.pass && c === saved.city) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                } else { alert("Invalid Credentials. Check your Password/City."); }
            }
        }

        // --- PASSWORD TOGGLE ---
        function togglePass(id) {
            const input = document.getElementById(id);
            const btn = event.target;
            if (input.type === "password") {
                input.type = "text";
                btn.innerText = "Hide";
            } else {
                input.type = "password";
                btn.innerText = "Show";
            }
        }

        // --- RECOVERY LOGIC ---
        function showRecovery() {
            if(!localStorage.getItem('nexus_master_vault')) return alert("No account found to recover.");
            document.getElementById('auth-fields').classList.add('hidden');
            document.getElementById('recovery-fields').classList.remove('hidden');
            document.getElementById('auth-title').innerText = "System Recovery";
        }

        function verifyAndReset() {
            const cityInput = document.getElementById('recover-city').value.trim();
            const saved = JSON.parse(localStorage.getItem('nexus_master_vault'));
            if(cityInput.toLowerCase() === saved.city.toLowerCase()) {
                localStorage.removeItem('nexus_master_vault');
                alert("Identity Verified. Vault Cleared. Setup a new one now.");
                location.reload();
            } else { alert("Wrong City! Access Denied."); }
        }

        window.onload = () => {
            if(!localStorage.getItem('nexus_master_vault')) {
                document.getElementById('auth-title').innerText = "Setup Vault";
            }
        };
    </script>
</body>
</html>
