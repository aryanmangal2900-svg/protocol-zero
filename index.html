<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | IDENTITY INITIALIZATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-client"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 50px; display: flex; justify-content: center; align-items: center; height: 80vh; }
        .vault-box { border: 2px solid #0f0; padding: 40px; box-shadow: 0 0 30px #0f0; background: #050505; border-radius: 5px; }
        input { background: #000; color: #0f0; border: 1px solid #0f0; padding: 12px; margin: 15px; width: 280px; font-size: 18px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; font-size: 20px; text-transform: uppercase; }
        button:hover { background: #00ffaa; box-shadow: 0 0 15px #0f0; }
        #status { margin-top: 25px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="vault-box">
        <h1 style="letter-spacing: 8px;">PROJECT NEXUS</h1>
        <p style="color: #666; font-size: 12px;">ESTABLISHING CRYPTO-LINK WITH THINKPAD HARDWARE...</p>
        
        <input type="text" id="opName" placeholder="Aryan Mangal">
        <br>
        <button onclick="initializeNexus()">INITIALIZE IDENTITY</button>

        <div id="status">SYSTEM STATUS: READY</div>
    </div>

    <script>
        // 1. Config ko pehle define kar rhe hain
        const SB_URL = "https://juesetrcnzyuybnwuyw.supabase.co";
        const SB_KEY = "sb_publishable_uP_mUKCmIANR-Stm0gjSVA_fpcHnji1"; 

        async function initializeNexus() {
            const name = document.getElementById('opName').value;
            const status = document.getElementById('status');
            
            if(!name) {
                status.style.color = "red";
                status.innerText = "SYSTEM ERROR: OPERATOR NAME REQUIRED";
                return;
            }

            try {
                // 2. Client ko function ke andar initialize kar rhe hain taaki 'before initialization' error na aaye
                const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
                
                status.style.color = "#00ffcc";
                status.innerText = "GENERATING HARDWARE-BOUND KEYS...";

                const keyPair = await window.crypto.subtle.generateKey(
                    { name: "ECDSA", namedCurve: "P-256" },
                    true, ["sign", "verify"]
                );

                const pubKeyRaw = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const pubKeyString = btoa(String.fromCharCode(...new Uint8Array(pubKeyRaw)));
                const uniqueID = "NX-" + Math.random().toString(36).substr(2, 9).toUpperCase();

                status.innerText = "UPLOADING TO SUPABASE VAULT...";

                const { error } = await supabaseClient
                    .from('identities')
                    .insert([{ 
                        unique_id: uniqueID, 
                        public_key: pubKeyString, 
                        operator_name: name 
                    }]);

                if (error) throw error;

                status.style.color = "yellow";
                status.innerHTML = `LINK ESTABLISHED!<br>ID: ${uniqueID}<br>OP: ${name}`;

            } catch (err) {
                status.style.color = "red";
                status.innerText = "SYSTEM ERROR: " + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
